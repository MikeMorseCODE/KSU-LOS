name: OnePlus 11 GKI Kernel Build + KSU-Next + SUSFS + Release

on:
  workflow_dispatch:
    inputs:
      lineage_build_url:
        description: 'Optional: LineageOS build URL (not used, kept for compat)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Configure Git auth
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev \
              python3 python3-pip python3-setuptools libncurses5-dev libncursesw5-dev \
              wget ccache curl unzip zip

      - name: Clone LineageOS kernel repo
        run: |
          git clone -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550

      - name: Clone Device Trees
        run: |
          git clone -b lineage-23.2 https://github.com/LineageOS/android_device_oneplus_sm8550-common.git kernel/oneplus/sm8550-devicetrees
          git clone -b lineage-23.2 https://github.com/LineageOS/android_device_oneplus_sm8550.git kernel/oneplus/sm8550-devicetrees/oneplus11

      - name: Patch live defconfig for GKI
        run: |
          cp ./lineage_oneplus11_defconfig kernel/oneplus/sm8550/arch/arm64/configs/
          echo "# CONFIG_OPLUS_SENSOR_DEVINFO is not set" >> kernel/oneplus/sm8550/arch/arm64/configs/lineage_oneplus11_defconfig
          echo "# CONFIG_OPLUS_FEATURE_SENSOR_CFG is not set" >> kernel/oneplus/sm8550/arch/arm64/configs/lineage_oneplus11_defconfig
          echo "Patched lineage_oneplus11_defconfig to disable Oplus sensors"

      - name: Setup KernelSU-Next
        run: |
          git clone https://github.com/WildKernels/KernelSU.git kernel/oneplus/sm8550/KernelSU-Next

      - name: Clone SUSFS repo
        run: |
          git clone https://github.com/WildKernels/susfs.git kernel/oneplus/sm8550/susfs

      - name: Apply SUSFS patches
        run: |
          # Add your patch commands here
          echo "Applying SUSFS patches..."

      - name: Apply WildKernels patches
        run: |
          # Add your patch commands here
          echo "Applying WildKernels patches..."

      - name: Build kernel
        run: |
          cd kernel/oneplus/sm8550
          make O=$KERNEL_OUT $DEFCONFIG
          make -j$(nproc) O=$KERNEL_OUT

      - name: Compile modules
        run: |
          cd kernel/oneplus/sm8550
          make modules -j$(nproc) O=$KERNEL_OUT

      - name: Package AnyKernel3 zip
        run: |
          cd kernel/oneplus/sm8550/out
          zip -r AnyKernel3.zip * 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3
          path: kernel/oneplus/sm8550/out/AnyKernel3.zip

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: kernel/oneplus/sm8550/out/AnyKernel3.zip
          tag: v1.0