name: OnePlus 11 GKI Kernel Build + KSU‑Next + SUSFS + WildKernels + Release

on:
  workflow_dispatch:
    inputs:
      lineage_build_url:
        description: 'Optional: LineageOS build URL (compat)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: self-hosted
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git authentication
      run: |
        git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

    - name: Setup ccache
      uses: actions/cache@v3
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-${{ hashFiles('**/.config') }}
        restore-keys: ccache-${{ runner.os }}-
    
    - name: Install dependencies
  run: |
    sudo pacman -Syu --noconfirm
    sudo pacman -S --needed --noconfirm \
      git curl unzip bc bison base-devel ncurses flex openssl elfutils \
      wget zip ccache clang lld llvm python python-pip python-setuptools
    python -m pip install --user --upgrade pip setuptools wheel
    
    - name: Clone kernel source
      run: |
        git clone https://github.com/MikeMorseCODE/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550 || echo "Kernel clone skipped"

    - name: Clone device tree
      run: |
        git clone -b lineage-23.2 https://github.com/LineageOS/android_device_oneplus_salami.git kernel/oneplus/salami‑devicetree || echo "Device tree clone skipped"

    - name: Detect kernel version
      id: detect_kernel
      run: |
        KVER=$(grep "^VERSION =" kernel/oneplus/sm8550/Makefile | awk '{print $3}')
        echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV

    - name: Patch live defconfig
      working-directory: kernel/oneplus/sm8550
      run: |
        if [ ! -f ../../lineage_oneplus11_defconfig ]; then
          echo "lineage_oneplus11_defconfig missing!"
          exit 1
        fi
        cp ../../lineage_oneplus11_defconfig arch/arm64/configs/
        echo "# CONFIG_OPLUS_SENSOR_DEVINFO is not set" >> arch/arm64/configs/lineage_oneplus11_defconfig
        echo "# CONFIG_OPLUS_FEATURE_SENSOR_CFG is not set" >> arch/arm64/configs/lineage_oneplus11_defconfig
        echo "Patched defconfig to disable Oplus sensors"

    - name: Setup KernelSU‑Next
      working-directory: kernel/oneplus/sm8550
      run: |
        curl -sL https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s next
        echo "CONFIG_KSU=y" >> arch/arm64/configs/lineage_oneplus11_defconfig

    - name: Clone SUSFS
      run: git clone https://github.com/WildKernels/susfs.git kernel/oneplus/sm8550/susfs

    - name: Apply SUSFS patches
      working-directory: kernel/oneplus/sm8550
      run: |
        cp -r susfs/kernel_patches/fs/* fs/ 2>/dev/null || true
        cp -r susfs/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
        echo "Applied SUSFS file includes"

    - name: Apply WildKernels patches
      working-directory: kernel/oneplus/sm8550
      run: |
        git clone https://github.com/WildKernels/kernel_patches.git ../../../wildkernels_patches
        for patch in ../../../wildkernels_patches/*.patch; do
          [ -f "$patch" ] || continue
          git apply --check "$patch" 2>/dev/null && git apply "$patch" && echo "Applied $patch" || echo "Skipped $patch"
        done

    - name: Build kernel
      working-directory: kernel/oneplus/sm8550
      run: |
        make O=$KERNEL_OUT ARCH=arm64 $DEFCONFIG
        make -j$(nproc) O=$KERNEL_OUT ARCH=arm64 Image

    - name: Compile modules
      working-directory: kernel/oneplus/sm8550
      run: make modules -j$(nproc) O=$KERNEL_OUT

    - name: Checkout AnyKernel3
      run: git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3

    - name: Package AnyKernel3 flashable
      run: |
        cp kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3
        zip -r9 OnePlus11‑Kernel.zip * -x ".git/*" -x "README.md"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OnePlus11‑Kernel‑Build
        path: |
          kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image
          AnyKernel3/OnePlus11‑Kernel.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "GKI‑${{ github.run_number }}"
        name: "OnePlus11 Kernel Build #${{ github.run_number }}"
        body: "Automated build for OnePlus11 GKI + KernelSU‑Next + SUSFS + WildK"
        files: |
          AnyKernel3/OnePlus11‑Kernel.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
