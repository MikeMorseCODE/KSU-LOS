name: OnePlus 11 GKI Kernel Build + KSU-Next + SUSFS + Release

on:
  workflow_dispatch:
    inputs:
      lineage_build_url:
        description: 'Optional: LineageOS build URL (not used, kept for compat)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out

    steps:
      - name: Configure git auth
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc ccache git wget unzip python3 zip curl clang lld llvm

      - name: Setup ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M 10G

      - name: Detect CPU cores
        run: echo "JOBS=$(nproc)" >> $GITHUB_ENV

      - name: Clone LineageOS kernel repos
        run: |
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-devicetrees.git kernel/oneplus/sm8550-devicetrees
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-modules.git kernel/oneplus/sm8550-modules
          ln -sfn ../sm8550-modules kernel/oneplus/sm8550-modules

      - name: Detect kernel version
        run: |
          KVER=$(grep "^VERSION =" kernel/oneplus/sm8550/Makefile | awk '{print $3}')
          KPATCH=$(grep "^PATCHLEVEL =" kernel/oneplus/sm8550/Makefile | awk '{print $3}')
          echo "KERNEL_VERSION=$KVER.$KPATCH" >> $GITHUB_ENV

      - name: Decompress config.gz if exists
        run: |
          CONFIG_PATH=kernel/oneplus/sm8550/arch/arm64/configs/config.gz
          DEFCONFIG_PATH=kernel/oneplus/sm8550/arch/arm64/configs/lineage_oneplus11_defconfig
          if [ -f "$CONFIG_PATH" ]; then
            gunzip -c "$CONFIG_PATH" > "$DEFCONFIG_PATH"
          else
            echo "config.gz not found, assuming lineage_oneplus11_defconfig exists"
          fi

      - name: Setup KernelSU-Next
        working-directory: kernel/oneplus/sm8550
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          echo "CONFIG_KSU=y" >> arch/arm64/configs/lineage_oneplus11_defconfig

      - name: Clone SUSFS repo
        run: git clone --depth 1 -b gki-android14-5.15 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

      - name: Apply SUSFS patches
        working-directory: kernel/oneplus/sm8550
        run: |
          cp ../../../susfs4ksu/kernel_patches/fs/* fs/
          cp ../../../susfs4ksu/kernel_patches/include/linux/* include/linux/
          SUSFS_PATCH=$(ls ../../../susfs4ksu/kernel_patches/*.patch 2>/dev/null | head -1)
          if [ -n "$SUSFS_PATCH" ]; then
            patch -p1 < "$SUSFS_PATCH" && echo "Applied $(basename $SUSFS_PATCH)"
          fi
          KSU_SUSFS_PATCH=$(find KernelSU-Next -name "*susfs*.patch" 2>/dev/null | head -1)
          [ -n "$KSU_SUSFS_PATCH" ] && patch -p1 < "$KSU_SUSFS_PATCH" || true
          cat >> arch/arm64/configs/lineage_oneplus11_defconfig << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          EOF

      - name: Clone and apply WildKernels patches
        working-directory: kernel/oneplus/sm8550
        run: |
          git clone --depth 1 https://github.com/WildKernels/kernel_patches.git ../../../wildkernels_patches
          for patch in ../../../wildkernels_patches/*.patch; do
            [ -f "$patch" ] || continue
            if git apply --check "$patch" 2>/dev/null; then
              git apply "$patch" && echo "Applied $(basename $patch)"
            else
              echo "Skipping $(basename $patch)"
            fi
          done

      - name: Build kernel
        working-directory: kernel/oneplus/sm8550
        run: |
          make O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
          make -j$JOBS O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- Image.gz-dtb

      - name: Compile modules
        working-directory: kernel/oneplus/sm8550-modules
        run: make -C ../sm8550 M=$(pwd) O=../sm8550/$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- modules

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cat > AnyKernel3/anykernel.sh << 'AKEOF'
# AnyKernel3 - OnePlus 11 (salami)
properties() { '
kernel.string=LineageOS KSU-Next+SUSFS Kernel for OnePlus 11
do.devicecheck=1
do.modules=0
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=salami
device.name2=OP5916L1
supported.versions=14
' ; }

block=/dev/block/bootdevice/by-name/boot;
is_slot_device=1;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;

. tools/ak3-core.sh;
split_boot;
flash_boot;
AKEOF
          cp kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 ../OnePlus11-KSU-SUSFS-AK3.zip * -x ".git/*" -x "README.md"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel
          path: OnePlus11-KSU-SUSFS-AK3.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "GKI-23.2-${{ github.run_number }}"
          name: "OnePlus11 Kernel Build #${{ github.run_number }}"
          body: "Automated OnePlus 11 GKI kernel build with KernelSU-Next + SUSFS. Flash via TWRP/recovery."
          draft: false
          prerelease: false
          files: OnePlus11-KSU-SUSFS-AK3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
