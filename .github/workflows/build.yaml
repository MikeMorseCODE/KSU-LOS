
name: OnePlus 11 GKI Kernel + KSU-Next + SUSFS + WildKernels + AnyKernel3

on:
  workflow_dispatch:
    inputs:
      lineage_build_url:
        description: 'Optional: LineageOS build URL (kept for compat)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out

    steps:
      - name: Configure git auth
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc ccache git wget unzip python3 zip curl clang lld llvm

      - name: Setup ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M 10G

      - name: Detect CPU cores
        run: echo "JOBS=$(nproc)" >> $GITHUB_ENV

      - name: Clone LineageOS kernel repos
        run: |
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-devicetrees.git kernel/oneplus/sm8550-devicetrees
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-modules.git kernel/oneplus/sm8550-modules
          ln -sfn ../sm8550-modules kernel/oneplus/sm8550-modules

      - name: Setup KernelSU-Next
        working-directory: kernel/oneplus/sm8550
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          echo "CONFIG_KSU=y" >> arch/arm64/configs/$DEFCONFIG

      - name: Clone SUSFS repo
        run: git clone --depth 1 -b gki-android14-5.15 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

      - name: Apply SUSFS patches safely
        working-directory: kernel/oneplus/sm8550
        run: |
          cp -rf ../../../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp -rf ../../../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          # Add SUSFS configs
          printf '%s\n' \
            'CONFIG_KSU_SUSFS=y' \
            'CONFIG_KSU_SUSFS_SUS_PATH=y' \
            'CONFIG_KSU_SUSFS_SUS_MOUNT=y' \
            'CONFIG_KSU_SUSFS_SUS_KSTAT=y' \
            'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y' \
            'CONFIG_KSU_SUSFS_TRY_UMOUNT=y' \
            'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' \
            'CONFIG_KSU_SUSFS_ENABLE_LOG=y' \
            'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y' \
            'CONFIG_QCOM_SMEM=y' \
            >> arch/arm64/configs/$DEFCONFIG

      - name: Apply WildKernels patches safely
        working-directory: kernel/oneplus/sm8550
        run: |
          git clone --depth 1 https://github.com/WildKernels/kernel_patches.git ../../../wildkernels_patches
          for patch in ../../../wildkernels_patches/*.patch; do
            [ -f "$patch" ] || continue
            if git apply --check "$patch" 2>/dev/null; then
              git apply "$patch" && echo "Applied $(basename $patch)"
            else
              echo "Skipping $(basename $patch)"
            fi
          done

      - name: Build kernel
        working-directory: kernel/oneplus/sm8550
        run: |
          make O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
          make -j$JOBS O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- Image

      - name: Compile modules
        working-directory: kernel/oneplus/sm8550-modules
        run: make -C ../sm8550 M=$(pwd) O=../sm8550/$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- modules

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp anykernel.sh AnyKernel3/anykernel.sh
          cp kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../OnePlus11-KSU-SUSFS-AK3.zip * -x ".git/*" -x "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel
          path: OnePlus11-KSU-SUSFS-AK3.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "GKI-23.2-${{ github.run_number }}"
          name: "OnePlus11 Kernel Build #${{ github.run_number }}"
          body: "Automated OnePlus 11 GKI kernel build with KernelSU-Next + SUSFS + WildKernels. Flash via AnyKernel3."
          draft: false
          prerelease: false
          files: OnePlus11-KSU-SUSFS-AK3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}