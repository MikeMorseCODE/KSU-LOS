name: Kernel Build

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: OnePlusOSS kernel/modules branch to build
        required: true
        default: oneplus/sm8550_b_16.0.0_oneplus_11
      target:
        description: Kernel make target
        required: true
        default: Image

jobs:
  build_kernel:
    runs-on: self-hosted
    timeout-minutes: 180

    env:
      ARCH: arm64
      KERNEL_BRANCH: ${{ inputs.kernel_branch }}
      TARGET: ${{ inputs.target }}
      DEFCONFIG: gki_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build kernel locally
        run: scripts/build-local.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel-Build
          path: |
            out/arch/arm64/boot/Image
            OnePlus11-Kernel.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: GKI-${{ github.run_number }}
          name: OnePlus11 Kernel Build #${{ github.run_number }}
          body: Automated OnePlus 11 (salami / SM8550) kernel build from OnePlusOSS sources.
          files: OnePlus11-Kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
