name: OnePlus 11 GKI Kernel + KSU-Next + SUSFS + WildKSU + AK3

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out
      JOBS: ${{ runner.cpus }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc ccache git wget unzip python3 zip curl clang lld llvm

      - name: Setup ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M 10G

      - name: Clone LineageOS kernel repos
        run: |
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-devicetrees.git kernel/oneplus/sm8550-devicetrees
          git clone --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-modules.git kernel/oneplus/sm8550-modules
          ln -sfn ../sm8550-modules kernel/oneplus/sm8550-modules

      - name: Pull live defconfig
        run: cp kernel/oneplus/sm8550/arch/arm64/configs/config.gz kernel/oneplus/sm8550/arch/arm64/configs/lineage_oneplus11_defconfig

      - name: Setup KernelSU-Next
        working-directory: kernel/oneplus/sm8550
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          echo "CONFIG_KSU=y" >> arch/arm64/configs/lineage_oneplus11_defconfig

      - name: Apply SUSFS safe subset
        working-directory: kernel/oneplus/sm8550
        run: |
          git clone --depth 1 -b gki-android14-5.15 https://gitlab.com/simonpunk/susfs4ksu.git ../../../susfs4ksu
          cp -r ../../../susfs4ksu/kernel_patches/fs/* fs/
          cp -r ../../../susfs4ksu/kernel_patches/include/linux/* include/linux/

      - name: Apply WildKernels patches safely
        working-directory: kernel/oneplus/sm8550
        run: |
          git clone --depth 1 https://github.com/WildKernels/kernel_patches.git ../../../wildkernels_patches
          for patch in ../../../wildkernels_patches/*.patch; do
              [ -f "$patch" ] || continue
              if git apply --check "$patch" 2>/dev/null; then
                  git apply "$patch" && echo "Applied $(basename $patch)"
              else
                  echo "Skipping $(basename $patch)"
              fi
          done

      - name: Build kernel
        working-directory: kernel/oneplus/sm8550
        run: |
          make O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- $DEFCONFIG
          make -j$JOBS O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- Image

      - name: Compile modules
        working-directory: kernel/oneplus/sm8550-modules
        run: make -C ../sm8550 M=$(pwd) O=../sm8550/$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- modules

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp anykernel.sh AnyKernel3/anykernel.sh
          cp kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image AnyKernel3/
          mkdir -p AnyKernel3/modules
          cp -r kernel/oneplus/sm8550/$KERNEL_OUT/lib/modules/* AnyKernel3/modules/
          cd AnyKernel3
          zip -r9 ../OnePlus11-KSU-SUSFS-Wild-AK3.zip * -x ".git/*" -x "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel
          path: OnePlus11-KSU-SUSFS-Wild-AK3.zip