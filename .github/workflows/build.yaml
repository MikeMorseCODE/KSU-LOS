name: OnePlus 11 GKI Kernel Build + KSU-Next + SUSFS + Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      KERNEL_OUT: out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Setup swap
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Configure git auth
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc ccache git wget unzip python3 zip curl clang lld llvm libelf-dev dwarves

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Setup ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M 10G

      - name: Detect CPU cores
        run: echo "JOBS=$(nproc --ignore=1)" >> $GITHUB_ENV

      - name: Clone LineageOS kernel source
        run: |
          rm -rf kernel/oneplus/sm8550
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-devicetrees.git kernel/oneplus/sm8550-devicetrees
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-modules.git kernel/oneplus/sm8550-modules

      - name: Setup KernelSU-Next
        working-directory: kernel/oneplus/sm8550
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: Clone and apply SUSFS
        working-directory: kernel/oneplus/sm8550
        run: |
          git clone --depth 1 -b gki-android14-5.15 https://gitlab.com/simonpunk/susfs4ksu.git ../../../susfs4ksu
          cp -r ../../../susfs4ksu/kernel_patches/fs/* fs/
          cp -r ../../../susfs4ksu/kernel_patches/include/linux/* include/linux/
          SUSFS_PATCH=$(ls ../../../susfs4ksu/kernel_patches/*.patch 2>/dev/null | head -1)
          [ -n "$SUSFS_PATCH" ] && git apply --3way --whitespace=nowarn "$SUSFS_PATCH" || true

      - name: Build kernel
        working-directory: kernel/oneplus/sm8550
        run: |
          cp $GITHUB_WORKSPACE/lineage_oneplus11_defconfig arch/arm64/configs/lineage_oneplus11_defconfig
          printf '%s\n' \
            'CONFIG_KSU=y' \
            'CONFIG_KSU_SUSFS=y' \
            'CONFIG_KSU_SUSFS_SUS_PATH=y' \
            'CONFIG_KSU_SUSFS_SUS_MOUNT=y' \
            'CONFIG_KSU_SUSFS_SUS_KSTAT=y' \
            'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y' \
            'CONFIG_KSU_SUSFS_TRY_UMOUNT=y' \
            'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' \
            'CONFIG_KSU_SUSFS_ENABLE_LOG=y' \
            'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y' \
            >> arch/arm64/configs/lineage_oneplus11_defconfig
          make O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- lineage_oneplus11_defconfig
          ./scripts/config --file $KERNEL_OUT/.config --disable HIBERNATION
          make O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig
          make -j$JOBS O=$KERNEL_OUT LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- Image

      - name: Package AnyKernel3 zip
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp anykernel.sh AnyKernel3/anykernel.sh
          cp kernel/oneplus/sm8550/$KERNEL_OUT/arch/arm64/boot/Image AnyKernel3/
          mkdir -p AnyKernel3/modules
          if [ -d kernel/oneplus/sm8550/$KERNEL_OUT/lib/modules ] && [ "$(ls -A kernel/oneplus/sm8550/$KERNEL_OUT/lib/modules)" ]; then
            cp -r kernel/oneplus/sm8550/$KERNEL_OUT/lib/modules/* AnyKernel3/modules/
          fi
          cd AnyKernel3
          zip -r9 ../OnePlus11-KSU-AK3.zip * -x ".git/*" -x "README.md"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel
          path: OnePlus11-KSU-AK3.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "GKI-23.2-${{ github.run_number }}"
          name: "OnePlus11 Kernel Build #${{ github.run_number }}"
          body: "Bare kernel build — no KSU/SUSFS/WildKernels. Boot test layer 1."
          draft: false
          prerelease: false
          files: OnePlus11-KSU-AK3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
