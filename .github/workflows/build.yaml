name: OnePlus 11 GKI Kernel Build + WildKSU + SUSFS + Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      DEFCONFIG: lineage_oneplus11_defconfig
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev bc ccache git wget unzip python3 python3-pip zip curl squashfs-tools

      - name: Setup ccache
        run: |
          mkdir -p $CCACHE_DIR
          ccache -M 10G
          ccache -s

      - name: Detect CPU cores
        run: echo "JOBS=$(nproc)" >> $GITHUB_ENV

      - name: Clone LineageOS kernel repos
        run: |
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550.git kernel/oneplus/sm8550
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-devicetrees.git kernel/oneplus/sm8550-devicetrees
          git clone --depth 1 --branch lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8550-modules.git kernel/oneplus/sm8550-modules

      - name: Clone WildKSU + SUSFS patches
        run: git clone --depth 1 https://github.com/WildKernels/GKI_KernelSU_SUSFS.git kernel_patches

      - name: Detect kernel version
        id: detect_kernel
        run: |
          KVER=$(grep "^VERSION =" kernel/oneplus/sm8550/Makefile | awk '{print $3}')
          KPATCH=$(grep "^PATCHLEVEL =" kernel/oneplus/sm8550/Makefile | awk '{print $3}')
          echo "Kernel version: $KVER.$KPATCH"
          echo "KERNEL_VERSION=$KVER.$KPATCH" >> $GITHUB_ENV

      - name: Decompress config.gz if it exists
        run: |
          CONFIG_PATH=kernel/oneplus/sm8550/arch/arm64/configs/config.gz
          DEFCONFIG_PATH=kernel/oneplus/sm8550/arch/arm64/configs/lineage_oneplus11_defconfig
          if [ -f "$CONFIG_PATH" ]; then
            echo "Decompressing config.gz to defconfig..."
            gunzip -c "$CONFIG_PATH" > "$DEFCONFIG_PATH"
          else
            echo "config.gz not found, assuming lineage_oneplus11_defconfig exists"
          fi

      - name: Apply WildKSU + SUSFS patches
        working-directory: kernel/oneplus/sm8550
        run: |
          PATCH_DIR=../../kernel_patches
          if [ ! -d "$PATCH_DIR" ]; then
            echo "Error: patch folder $PATCH_DIR does not exist!"
            exit 1
          fi
          touch applied_patches.txt
          for patch in $(ls $PATCH_DIR | grep "$KERNEL_VERSION"); do
            if ! grep -qx "$patch" applied_patches.txt; then
              if git apply --check $PATCH_DIR/$patch; then
                git apply $PATCH_DIR/$patch
                echo "$patch" >> applied_patches.txt
                echo "Applied $patch"
              else
                echo "Skipping $patch (check failed)"
              fi
            fi
          done

      - name: Download LineageOS full build
        run: |
          BUILD_URL="https://mirrorbits.lineageos.org/full/salami/20260417/lineage-23.2-20260417-nightly-salami-signed.zip"
          wget -q $BUILD_URL -O lineage.zip
          unzip -q lineage.zip boot.img system.img
          mkdir -p kernel/oneplus/sm8550/ramdisk

      - name: Fetch ramdisk extraction script
        run: |
          wget -O kernel/oneplus/sm8550/ramdisk/extract_ramdisk.sh https://raw.githubusercontent.com/EmberHeart/OnePlus11KernelTools/main/extract_boot.sh
          chmod +x kernel/oneplus/sm8550/ramdisk/extract_ramdisk.sh

      - name: Extract ramdisk.img
        working-directory: kernel/oneplus/sm8550/ramdisk
        run: ../extract_ramdisk.sh ../../boot.img

      - name: Build kernel
        working-directory: kernel/oneplus/sm8550
        run: |
          make O=out lineage_oneplus11_defconfig
          make -j$JOBS O=out

      - name: Compile modules
        working-directory: kernel/oneplus/sm8550-modules
        run: make -C ../sm8550 M=$(pwd) O=../sm8550/out modules

      - name: Package boot.img
        working-directory: kernel/oneplus/sm8550
        run: |
          mkdir -p out/bootimg
          cp out/arch/arm64/boot/Image.gz-dtb out/bootimg/zImage-dtb
          wget -O mkbootimg https://raw.githubusercontent.com/EmberHeart/OnePlus11KernelTools/main/mkbootimg
          chmod +x mkbootimg
          ./mkbootimg --kernel out/bootimg/zImage-dtb --ramdisk ramdisk/ramdisk.img --output out/boot.img

      - name: Create AK3-style flashable zip
        working-directory: kernel/oneplus/sm8550
        run: |
          mkdir -p out/flashable-AK3/META-INF/com/google/android
          cp out/boot.img out/flashable-AK3/boot.img
          wget -O updater-script https://raw.githubusercontent.com/EmberHeart/OnePlus11KernelTools/main/updater-script
          mv updater-script out/flashable-AK3/META-INF/com/google/android/updater-script
          cd out/flashable-AK3
          zip -r OnePlus11-Kernel-AK3.zip *

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus11-Kernel-Images
          path: |
            kernel/oneplus/sm8550/out/boot.img
            kernel/oneplus/sm8550/out/flashable-AK3/OnePlus11-Kernel-AK3.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "GKI-23.2-${{ github.run_number }}"
          name: "OnePlus11 Kernel Build #${{ github.run_number }}"
          body: "Automated build of OnePlus 11 GKI kernel with WildKSU + SUSFS patches. Includes boot.img and AK3 zip."
          draft: false
          prerelease: false
          files: |
            kernel/oneplus/sm8550/out/boot.img
            kernel/oneplus/sm8550/out/flashable-AK3/OnePlus11-Kernel-AK3.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
